<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />

    <!-- Primary Meta Tags -->
    <title>九紫离火API</title>
    <meta name="title" content="九紫离火API" />
    <meta
      name="description"
      content="Unified AI API gateway and admin dashboard."
    />

    <meta name="theme-color" content="#7c3aed" />
    <!--umami-->
    <!--Google Analytics-->

    <script>
      // 提前应用主题（读 vite-ui-theme cookie，与 ThemeProvider 同源同默认）：
      // 消除暗色用户首帧白闪，并让开屏加载页底色与应用一致。
      ;(function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)vite-ui-theme=([^;]*)/)
          var t = m ? decodeURIComponent(m[1]) : 'system'
          if (t !== 'dark' && t !== 'light') {
            t =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          }
          document.documentElement.classList.add(t)
        } catch (e) {}
      })()
    </script>
    <style id="splash-style">
      :root {
        --splash-bg: oklch(0.995 0.003 320);
        --splash-track: oklch(0.93 0.012 320);
      }
      html.dark {
        --splash-bg: oklch(0.185 0.014 312);
        --splash-track: oklch(0.28 0.02 312);
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: var(--splash-bg);
        transition: opacity 0.3s ease;
      }
      #splash.splash-leave {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-logo {
        width: 72px;
        height: 72px;
        animation: splash-breathe 2.2s ease-in-out infinite;
      }
      #splash .splash-track {
        width: 132px;
        height: 3px;
        border-radius: 999px;
        background: var(--splash-track);
        overflow: hidden;
      }
      #splash .splash-fill {
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          oklch(0.66 0.215 305),
          oklch(0.66 0.22 340),
          oklch(0.64 0.225 30),
          oklch(0.75 0.16 80)
        );
        animation: splash-slide 1.1s ease-in-out infinite alternate;
      }
      @keyframes splash-breathe {
        0%,
        100% {
          filter: drop-shadow(0 0 12px oklch(0.66 0.215 305 / 0.35));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 26px oklch(0.64 0.225 30 / 0.45));
          transform: scale(1.04);
        }
      }
      @keyframes splash-slide {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(250%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .splash-logo,
        #splash .splash-fill {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="splash" aria-hidden="true">
      <img
        class="splash-logo"
        src="/logo.svg"
        alt=""
        onerror="this.style.display = 'none'"
      />
      <div class="splash-track"><div class="splash-fill"></div></div>
    </div>
    <script>
      // 兜底：主包加载失败/脚本异常时 15s 后自动淡出，避免开屏永久遮挡错误现场。
      setTimeout(function () {
        var el = document.getElementById('splash')
        if (el && !el.classList.contains('splash-leave')) {
          el.classList.add('splash-leave')
          setTimeout(function () {
            el.remove()
          }, 400)
        }
      }, 15000)
    </script>
    <div id="root" translate="no" class="notranslate"></div>
  </body>
</html>
